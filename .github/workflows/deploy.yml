# Shimane IB Recruitment — Deploy workflow
#
# Required GitHub repository secrets (Settings → Secrets → Actions):
#   DB_HOST      — Supabase host, e.g. db.XXXX.supabase.co
#   DB_PORT      — 5432
#   DB_NAME      — postgres
#   DB_USER      — postgres
#   DB_PASSWORD  — your Supabase database password
#   DB_SCHEMA    — shimaai
#   FTP_HOST     — 156.67.70.45
#   FTP_USER     — u896954886.robouni.ac
#   FTP_PORT     — 21
#   FTP_PASSWORD — your FTP password
#   FTP_PATH     — /home/u896954886/domains/robouni.ac/public_html/shimaai/

name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate config.php from secrets
        run: |
          cat > config.php << 'PHPEOF'
          <?php
          define('DB_HOST',     '${{ secrets.DB_HOST }}');
          define('DB_PORT',     '${{ secrets.DB_PORT }}');
          define('DB_NAME',     '${{ secrets.DB_NAME }}');
          define('DB_USER',     '${{ secrets.DB_USER }}');
          define('DB_PASSWORD', '${{ secrets.DB_PASSWORD }}');
          define('DB_SCHEMA',   '${{ secrets.DB_SCHEMA }}');
          PHPEOF

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: ${{ secrets.FTP_PORT }}
          server-dir: ${{ secrets.FTP_PATH }}
          exclude: |
            **/.git/**
            **/.github/**
            **/db/**
            **/node_modules/**
